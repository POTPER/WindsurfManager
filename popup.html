<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windsurf 账号管理器</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="toastContainer" class="toast-container"></div>
    <main class="app">
      <header class="top-bar">
        <div class="top-bar-title">
          <span class="app-icon"></span>
          <div class="title-text">
            <span class="eyebrow">Windsurf</span>
            <h1>账号管理器</h1>
          </div>
        </div>
      </header>

      <div id="loginModal" class="modal-overlay" hidden>
        <div class="modal-dialog">
          <div class="modal-header">
            <span class="modal-title">添加账号</span>
            <button id="loginCloseBtn" class="icon-button" type="button">✕</button>
          </div>
          <div class="modal-body">
            <label class="settings-label">每行一个账号：邮箱 密码（空格分隔）</label>
            <p class="settings-hint">密码导入失败时，请先在浏览器登录对应 Windsurf 账号，再点击“保存状态”导入当前会话。</p>
            <textarea id="loginBatch" class="settings-input batch-textarea" rows="6" placeholder="user1@email.com password1
user2@email.com password2"></textarea>
            <div id="batchLog" class="batch-log" hidden></div>
          </div>
          <div class="modal-footer">
            <button id="loginParseBtn" class="ghost-button-sm" type="button">✂ 整理</button>
            <span id="batchProgress" class="batch-progress"></span>
            <button id="loginSubmitBtn" class="primary-button-sm" type="button">开始登录</button>
          </div>
        </div>
      </div>


      <section id="currentAccountSection" class="current-account" hidden>
        <div class="current-account-label">当前账号</div>
        <article class="session-card">
          <span id="currentPlanBadge" class="plan-badge"></span>
          <span class="card-sep">|</span>
          <span class="ring-tag">日</span>
          <div id="currentDaily" class="quota-ring" title="">
            <svg viewBox="0 0 36 36"><circle class="ring-bg" cx="18" cy="18" r="15.5"/><circle class="ring-fg" cx="18" cy="18" r="15.5"/></svg>
            <span class="ring-pct"></span>
          </div>
          <span class="ring-tag">周</span>
          <div id="currentWeekly" class="quota-ring" title="">
            <svg viewBox="0 0 36 36"><circle class="ring-bg" cx="18" cy="18" r="15.5"/><circle class="ring-fg" cx="18" cy="18" r="15.5"/></svg>
            <span class="ring-pct"></span>
          </div>
          <span class="card-sep">|</span>
          <span class="ring-tag">天</span>
          <div id="currentDays" class="quota-ring" title="">
            <svg viewBox="0 0 36 36"><circle class="ring-bg" cx="18" cy="18" r="15.5"/><circle class="ring-fg" cx="18" cy="18" r="15.5"/></svg>
            <span class="ring-pct"></span>
          </div>
          <span class="card-sep hide-md">|</span>
          <span class="session-name hide-md" id="currentAccountName"></span>
        </article>
      </section>

      <section class="smart-switch-bar">
        <button id="smartSwitchBtn" class="smart-switch-btn" type="button" title="平时选日配额最充足的账号；临近周日16:00刷新时，优先消耗即将重置的账号，避免浪费配额">智能切换</button>
      </section>

      <section>
        <div class="section-title">
          <span>账号列表</span>
          <span id="refreshCountdown" class="refresh-countdown"></span>
          <div class="section-actions">
            <button id="exportJsonBtn" class="ghost-button-sm" type="button">↓ 导出</button>
            <button id="importJsonBtn" class="ghost-button-sm" type="button">↑ 导入</button>
            <input id="importFileInput" type="file" accept=".json" hidden />
            <button id="captureSessionBtn" class="primary-button-sm" type="button">+ 保存状态</button>
            <button id="loginToggle" class="primary-button-sm" type="button">+ 添加账号</button>
          </div>
        </div>
        <div id="sessionList" class="session-list"></div>
      </section>
    </main>

    <template id="sessionItemTemplate">
      <article class="session-card">
        <span class="plan-badge"></span>
        <span class="card-sep">|</span>
        <span class="ring-tag">日</span>
        <div class="quota-ring usage-daily" title="">
          <svg viewBox="0 0 36 36"><circle class="ring-bg" cx="18" cy="18" r="15.5"/><circle class="ring-fg" cx="18" cy="18" r="15.5"/></svg>
          <span class="ring-pct"></span>
        </div>
        <span class="ring-tag">周</span>
        <div class="quota-ring usage-weekly" title="">
          <svg viewBox="0 0 36 36"><circle class="ring-bg" cx="18" cy="18" r="15.5"/><circle class="ring-fg" cx="18" cy="18" r="15.5"/></svg>
          <span class="ring-pct"></span>
        </div>
        <span class="card-sep">|</span>
        <span class="ring-tag">天</span>
        <div class="quota-ring usage-days" title="">
          <svg viewBox="0 0 36 36"><circle class="ring-bg" cx="18" cy="18" r="15.5"/><circle class="ring-fg" cx="18" cy="18" r="15.5"/></svg>
          <span class="ring-pct"></span>
        </div>
        <span class="card-sep hide-md">|</span>
        <span class="session-name hide-md"></span>
        <span class="usage-time hide-lg"></span>
        <div class="session-actions">
          <button class="primary-button-sm action-restore" type="button">切换</button>
        </div>
      </article>
    </template>

    <script type="module" src="popup.js"></script>
  </body>
  </html>
